<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>123 Maple St, Springfield | Redfin</title>
  <meta property="og:image" content="https://ssl.cdn-redfin.com/photo/og/123-maple-hero.jpg" />
  <meta name="twitter:image" content="https://ssl.cdn-redfin.com/photo/tw/123-maple-twitter.jpg" />
</head>
<body>
  <div class="home-main-stats">
    <div class="stat-block">
      <span class="statsValue">3</span>
      <span class="statsLabel">Beds</span>
    </div>
    <div class="stat-block">
      <span class="statsValue">2</span>
      <span class="statsLabel">Baths</span>
    </div>
    <div class="stat-block">
      <span class="statsValue">1,840</span>
      <span class="statsLabel">Sq Ft</span>
    </div>
  </div>

  <p class="remarks">
    Charming 3 beds / 2 baths home with an updated kitchen, bright living room,
    a 2-car garage, a fenced yard, and a dedicated office nook. The dining room
    opens to the patio.
  </p>

  <section class="photo-gallery">
    <img src="https://ssl.cdn-redfin.com/photo/123/genMid.bedroom-1.jpg" alt="Primary bedroom" />
    <img src="https://ssl.cdn-redfin.com/photo/123/genMid.bathroom-1.jpg" alt="Bathroom" />
    <img
      src="https://ssl.cdn-redfin.com/photo/123/genMid.kitchen-1.jpg"
      srcset="https://ssl.cdn-redfin.com/photo/123/small.kitchen-1.jpg 320w, https://ssl.cdn-redfin.com/photo/123/large.kitchen-1.jpg 1024w"
      alt="Kitchen" />
    <img data-src="https://ssl.cdn-redfin.com/photo/123/genMid.garage-1.jpg" alt="Garage (lazy)" />
    <!-- A duplicate of the hero image; the parser must de-dup it. -->
    <img src="https://ssl.cdn-redfin.com/photo/og/123-maple-hero.jpg" alt="Hero again" />
  </section>
</body>
</html>
